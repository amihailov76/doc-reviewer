# Этот файл кладётся в doc-reviewer по пути:
#   .github/workflows/docs-review.yml

name: Docs Review

on:
  pull_request:
    types: [labeled]
    paths:
      - 'docs/**'

# Вызываем reusable workflow из docs-pipeline.
# Раннер берётся из пула docs-pipeline (self-hosted, зарегистрированный там).
# Секреты docs-pipeline не нужны — workflow сам читает свои ресурсы.
# Все секреты docs-pipeline.secrets передаются через secrets: inherit,
# поэтому их нужно добавить в Settings → Secrets в репо doc-reviewer.

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.label.name == 'docs-review'
    uses: amihailov76/docs-pipeline/.github/workflows/docs-review.yml@main
    secrets: inherit
    # Опционально: переопределить паттерны, если структура папок отличается
    # with:
    #   docs_pattern: '^docs/(ru|en)/.+\.mdx$'
    #   ru_path_filter: 'docs/ru'
    #   en_path_filter: 'docs/en'
