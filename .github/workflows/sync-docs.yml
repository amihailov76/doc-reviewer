name: Sync documentation to mintlify-docs

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'criteria.md'
      - 'models.yml'
  workflow_dispatch:
    inputs:
      model:
        description: 'LLM model name (leave empty for default from config.yml)'
        required: false
        default: ''
      since:
        description: 'Git ref to diff from (default: HEAD~1)'
        required: false
        default: 'HEAD~1'

jobs:
  sync-docs:
    name: Sync documentation
    runs-on: self-hosted          # ← запускается на вашем компьютере

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout doc-reviewer
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # нужна полная история для git diff

      - name: Checkout mintlify-docs
        uses: actions/checkout@v4
        with:
          repository: amihailov76/mintlify-docs
          path: mintlify-docs
          token: ${{ secrets.GH_TOKEN }}

      - name: Copy automation scripts
        run: |
          New-Item -ItemType Directory -Force -Path sync-automation | Out-Null
          Copy-Item -Recurse -Force docs/automation/* sync-automation/

      - name: Install dependencies
        run: pip install openai pyyaml

      - name: Update config for this run
        run: |
          $script = @"
          import yaml, pathlib
          cfg_path = pathlib.Path('sync-automation/config.yml')
          cfg = yaml.safe_load(cfg_path.read_text(encoding='utf-8'))
          cfg['repos']['doc_reviewer'] = '.'
          cfg['repos']['mintlify_docs'] = 'mintlify-docs'
          cfg_path.write_text(yaml.dump(cfg, allow_unicode=True), encoding='utf-8')
          "@
          $script | python

      - name: Run sync script
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONUTF8: "1"
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          $model = "${{ github.event.inputs.model }}"
          $since = "${{ github.event.inputs.since }}"
          if (-not $since) { $since = "HEAD~1" }
          $cmd = "python sync-automation/sync_docs.py --since $since --no-pr"
          if ($model) { $cmd += " --model $model" }
          Invoke-Expression $cmd

      - name: Push changes and create PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          Set-Location mintlify-docs
          $changes = git status --porcelain
          if ($changes) {
            $branch = git rev-parse --abbrev-ref HEAD
            $date = Get-Date -Format 'yyyy-MM-dd'
            gh pr create `
              --title "docs: sync from doc-reviewer $date" `
              --body "Автоматическое обновление документации. Triggered by commit ${{ github.sha }}." `
              --base main `
              --head $branch `
              --repo amihailov76/mintlify-docs
          } else {
            Write-Host "Нет изменений для PR"
          }
