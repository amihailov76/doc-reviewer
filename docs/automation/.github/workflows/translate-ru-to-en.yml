name: Translate RU to EN in mintlify-docs

# Этот workflow размещается в репозитории mintlify-docs (не doc-reviewer).
# Срабатывает при изменениях в папке ru/ и автоматически обновляет en/.

on:
  push:
    branches:
      - main
    paths:
      - 'ru/**'
  workflow_dispatch:
    inputs:
      model:
        description: 'LLM model name (leave empty for default from config.yml)'
        required: false
        default: ''
      since:
        description: 'Git ref to diff from (default: HEAD~1)'
        required: false
        default: 'HEAD~1'

jobs:
  translate-ru-to-en:
    name: Translate RU → EN
    runs-on: self-hosted          # ← запускается на вашем компьютере

    steps:
      - name: Checkout mintlify-docs
        uses: actions/checkout@v4
        with:
          fetch-depth: 2          # нужно для сравнения HEAD~1
          token: ${{ secrets.GH_TOKEN }}

      - name: Checkout automation scripts from doc-reviewer
        uses: actions/checkout@v4
        with:
          repository: amihailov76/doc-reviewer
          path: doc-reviewer-scripts
          token: ${{ secrets.GH_TOKEN }}
          sparse-checkout: |
            docs/automation
          sparse-checkout-cone-mode: false

      - name: Copy automation scripts
        run: cp -r doc-reviewer-scripts/docs/automation/. ./automation/

      - name: Update config paths for this run
        run: |
          python3 - <<'EOF'
          import yaml, pathlib

          cfg_path = pathlib.Path("automation/config.yml")
          cfg = yaml.safe_load(cfg_path.read_text())
          cfg["repos"]["mintlify_docs"] = "."
          cfg_path.write_text(yaml.dump(cfg, allow_unicode=True))
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai pyyaml

      - name: Run translation script
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          MODEL="${{ github.event.inputs.model }}"
          SINCE="${{ github.event.inputs.since || 'HEAD~1' }}"
          CMD="python3 automation/translate_to_en.py --since $SINCE --no-pr"
          if [ -n "$MODEL" ]; then
            CMD="$CMD --model $MODEL"
          fi
          $CMD

      - name: Create PR with EN updates
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if git status --porcelain | grep -q .; then
            BRANCH=$(git rev-parse --abbrev-ref HEAD)
            gh pr create \
              --title "docs: translate RU→EN $(date +%Y-%m-%d)" \
              --body "Автоматический перевод изменений в ru/ на английский язык. Triggered by commit ${{ github.sha }}." \
              --base main \
              --head "$BRANCH" \
              --repo amihailov76/mintlify-docs
          else
            echo "Нет изменений для PR"
          fi
